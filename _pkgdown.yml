url: https://cidree.github.io/duckspatial/
template:
  # ── Written with Claude ──────────────────────────────────────────────────────
  bootstrap: 5
  bslib:
    # ── Palette ────────────────────────────────────────────────────────────────
    # Deep ink background with sharp teal-cyan accent — evokes water, maps,
    # and the precision of a database engine.
    bg:                 '#F8FAFB'   # near-white with a cool undertone
    fg:                 '#0D1B2A'   # deep navy ink
    primary:            '#0A7EA4'   # vivid teal — links, buttons, active states
    secondary:          '#FF6B35'   # burnt orange — badges, highlights
    success:            '#2CB67D'   # muted green
    info:               '#5B8DB8'   # mid steel blue
    warning:            '#F4A261'   # warm amber
    danger:             '#E63946'   # clear red

    # ── Navbar ─────────────────────────────────────────────────────────────────
    pkgdown-nav-height: 70px

    # ── Typography ─────────────────────────────────────────────────────────────
    # DM Sans — geometric, technical, slightly quirky; pairs well with the
    # spatial/engineering context without feeling corporate.
    # DM Mono — optical sibling of DM Sans, gives code blocks visual harmony.
    base_font:
      google:
        family: DM Sans
        wght:   "300;400;500;600"
    heading_font:
      google:
        family: DM Sans
        wght:   "600;700"
    code_font:
      google:
        family: DM Mono
        wght:   "400;500"

    # ── Spacing & shape ────────────────────────────────────────────────────────
    border-radius:       0.5rem
    border-radius-sm:    0.3rem
    border-radius-lg:    0.75rem
    font-size-base:      1rem
    line-height-base:    1.65

  # Syntax highlighting
  light-switch: true
  theme: a11y-light
  theme-dark: a11y-dark

  # ── Custom CSS  ───────────────────────────────────────────────────
  includes:
    in_header: |
      <style>
      /* ── Navbar ─────────────────────────────────────────────────── */
      .navbar {
        background: #0D1B2A !important;
        border-bottom: 2px solid #0A7EA4;
        letter-spacing: 0.01em;
      }
      .navbar-brand {
        font-weight: 700;
        font-size: 1.15rem;
        color: #ffffff !important;
        letter-spacing: -0.02em;
      }
      .navbar-nav .nav-link {
        color: rgba(255,255,255,0.80) !important;
        font-weight: 500;
        font-size: 0.9rem;
        transition: color 0.15s;
      }
      .navbar-nav .nav-link:hover,
      .navbar-nav .nav-link.active {
        color: #0A7EA4 !important;
      }

      .navbar .text-muted {
        color: rgba(255,255,255,0.60) !important;
      }

      /* ── Vignette TOC ────────────────────────────────────────────── */
      /* Shared structure */
      #toc a,
      #toc .nav-link,
      .bd-toc a,
      .bd-toc .nav-link,
      .bs-docs-sidebar .nav > li > a {
        font-size: 0.85rem;
        border-left: 2px solid transparent;
        padding-left: 0.75rem;
        text-decoration: none;
        transition: border-color 0.15s, color 0.15s;
      }

      /* Light mode (default) */
      #toc,
      #toc .nav,
      .bd-toc,
      .bd-toc .nav {
        --bs-nav-link-color:       #3d5166;
        --bs-nav-link-hover-color: #0A7EA4;
      }
      #toc a,
      #toc .nav-link,
      .bd-toc a,
      .bd-toc .nav-link,
      .bs-docs-sidebar .nav > li > a {
        color: #3d5166 !important;
      }
      #toc a:hover,
      #toc .nav-link:hover,
      #toc .nav-link.active,
      .bd-toc a:hover,
      .bd-toc .nav-link.active,
      .bs-docs-sidebar .nav > li > a:hover,
      .bs-docs-sidebar .nav > li.active > a {
        color: #0A7EA4 !important;
        border-left-color: #0A7EA4;
      }

      /* Dark mode — pkgdown adds data-bs-theme="dark" on <html> */
      [data-bs-theme="dark"] #toc,
      [data-bs-theme="dark"] #toc .nav,
      [data-bs-theme="dark"] .bd-toc,
      [data-bs-theme="dark"] .bd-toc .nav {
        --bs-nav-link-color:       #a8c0d6;
        --bs-nav-link-hover-color: #3dd6f5;
      }
      [data-bs-theme="dark"] #toc a,
      [data-bs-theme="dark"] #toc .nav-link,
      [data-bs-theme="dark"] .bd-toc a,
      [data-bs-theme="dark"] .bd-toc .nav-link,
      [data-bs-theme="dark"] .bs-docs-sidebar .nav > li > a {
        color: #a8c0d6 !important;
      }
      [data-bs-theme="dark"] #toc a:hover,
      [data-bs-theme="dark"] #toc .nav-link:hover,
      [data-bs-theme="dark"] #toc .nav-link.active,
      [data-bs-theme="dark"] .bd-toc a:hover,
      [data-bs-theme="dark"] .bd-toc .nav-link.active,
      [data-bs-theme="dark"] .bs-docs-sidebar .nav > li > a:hover,
      [data-bs-theme="dark"] .bs-docs-sidebar .nav > li.active > a {
        color: #3dd6f5 !important;
        border-left-color: #3dd6f5;
      }

      /* ── Tables ─────────────────────────────────────────────────── */
      .table thead th {
        background: #0D1B2A;
        color: #ffffff;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        font-weight: 600;
        border: none;
      }
      .table tbody tr:hover { background: #f0f7fb; }
      .table { border-radius: 0.5rem; overflow: hidden; }
      
      </style>

authors:
  Adrián Cidre González:
    href: https://adrian-cidre.com/
  Rafael H. M. Pereira:
    href: https://www.urbandemographics.org/about/
  Egor Kotov:
    href: https://www.ekotov.pro/

# ── Reference index ────────────────────────────────────────────────────────────
reference:
- title: Setup and Connection
  desc: Install the spatial extension and manage DuckDB connections
  contents:
  - ddbs_create_conn
  - ddbs_stop_conn
  - ddbs_install
  - ddbs_load
  - ddbs_options
  - ddbs_set_resources
  - ddbs_get_resources
  - ddbs_sitrep

- title: Data Import / Export
  desc: Read and write spatial data to and from DuckDB
  contents:
  - ddbs_open_dataset
  - ddbs_read_table
  - ddbs_write_dataset
  - ddbs_write_table
  - ddbs_register_table

- title: Spatial Predicates
  desc: Test spatial relationships between geometries
  contents:
  - ddbs_predicate

- title: Spatial Joins and Filters
  desc: Combine or subset geometries based on spatial relationships
  contents:
  - ddbs_binary_funs
  - ddbs_filter
  - ddbs_interpolate_aw
  - ddbs_join

- title: Geometry Construction
  desc: Create new geometries from scratch or from existing data
  contents:
  - ddbs_as_points
  - ddbs_generate_points
  - ddbs_quadkey

- title: Geometry Processing
  desc: Modify, simplify, and transform individual geometries
  contents:
  - ddbs_boundary
  - ddbs_buffer
  - ddbs_build_area
  - ddbs_centroid
  - ddbs_concave_hull
  - ddbs_convex_hull
  - ddbs_endpoint_startpoint
  - ddbs_exterior_ring
  - ddbs_make_polygon
  - ddbs_multi
  - ddbs_polygonize
  - ddbs_union_funs
  - ddbs_voronoi

- title: Coordinate Operations
  desc: Transform and manipulate coordinate systems
  contents:
  - ddbs_transform
  - ddbs_flip_coordinates
  - ddbs_xy
  - ddbs_force_dim

- title: Geometry Validation
  desc: Check and repair geometry validity and dimensionality
  contents:
  - ddbs_geometry_type
  - ddbs_make_valid
  - ddbs_simplify
  - ddbs_geom_validation_funs
  - ddbs_has_dim

- title: Format Conversion
  desc: Convert geometries to and from standard spatial formats
  contents:
  - ddbs_as_format

- title: Spatial Extent and Boundaries
  desc: Extract bounding boxes and envelopes
  contents:
  - ddbs_bbox
  - ddbs_envelope

- title: Affine Transformations
  desc: Rotate, scale, shear, and shift geometries
  contents:
  - ddbs_flip
  - ddbs_rotate
  - ddbs_rotate_3d
  - ddbs_scale
  - ddbs_shear
  - ddbs_shift

- title: Measurements
  desc: Calculate areas, distances, lengths, and perimeters
  contents:
  - ddbs_measure_funs

- title: Database Utilities
  desc: Helper functions for managing DuckDB schemas and metadata
  contents:
  - ddbs_create_schema
  - ddbs_crs
  - ddbs_drivers
  - ddbs_glimpse
  - ddbs_list_tables

- title: Lazy Spatial Data Frames
  desc: Create and work with lazy `duckspatial_df` objects
  contents:
  - as_duckspatial_df
  - is_duckspatial_df
  - ddbs_collect
  - ddbs_compute
  - ddbs_drop_geometry
  - ddbs_geom_col
  - duckspatial_df_sf
  - duckspatial_df_dplyr

